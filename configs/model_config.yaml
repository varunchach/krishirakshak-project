# Model Configuration — Disease Classes & Thresholds

model:
  name: "florence2-krishirakshak"
  version: "1.1.0"
  task_prompt: "<CROP_DISEASE>"

confidence_thresholds:
  high: 0.85      # Green — confident diagnosis
  medium: 0.60    # Yellow — likely but verify
  low: 0.40       # Orange — uncertain, suggest expert consultation
  reject: 0.40    # Below this — do not show diagnosis

