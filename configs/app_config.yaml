# KrishiRakshak Application Configuration

app:
  name: "KrishiRakshak"
  version: "1.0.0"
  description: "AI-Powered Crop Disease Diagnosis System"
  api_prefix: "/v1"
  debug: false
  log_level: "INFO"
  log_format: "json"

server:
  host: "0.0.0.0"
  port: 8000
  workers: 2
  timeout: 60
  cors_origins:
    - "http://localhost:8501"  # Streamlit
    - "https://krishirakshak.example.com"

model:
  sagemaker_endpoint: "krishirakshak-florence2"
  confidence_threshold: 0.40  # Below this → "uncertain" response
  bedrock_fallback: true
  bedrock_model_id: "anthropic.claude-3-sonnet-20240229-v1:0"
  bedrock_max_tokens: 500
  bedrock_region: "us-east-1"

image:
  max_size_mb: 5
  allowed_formats: ["jpeg", "jpg", "png", "webp"]
  resize_to: 224  # Florence-2 input size
  strip_exif: true

storage:
  s3_bucket: "krishirakshak-images"
  s3_prefix: "uploads/"
  dynamodb_table: "krishirakshak-predictions"

rate_limiting:
  requests_per_minute: 100
  burst_size: 20

retry:
  max_attempts: 3
  backoff_base: 0.5  # seconds
  backoff_max: 5.0

timeouts:
  sagemaker_inference: 30  # seconds
  sarvam_translate: 10
  sarvam_tts: 15
  bedrock: 20
  total_request: 45
