# Sarvam AI Configuration

api:
  base_url: "https://api.sarvam.ai"
  ssm_parameter_name: "/krishirakshak/sarvam-api-key"  # AWS SSM Parameter Store key
  timeout: 10  # seconds
  retry_delay_ms: 200  # Delay between calls (free tier rate limit)

translation:
  endpoint: "/translate"
  model: "mayura:v1"
  source_language: "en-IN"
  mode: "formal"
  enable_preprocessing: true
  supported_languages:
    Hindi: "hi-IN"
    Marathi: "mr-IN"
    Tamil: "ta-IN"
    Telugu: "te-IN"
    Kannada: "kn-IN"
    Bengali: "bn-IN"
    Gujarati: "gu-IN"
    Malayalam: "ml-IN"
    Odia: "od-IN"
    Punjabi: "pa-IN"

tts:
  endpoint: "/text-to-speech"
  model: "bulbul:v1"
  default_speaker: "meera"
  speakers:
    female: "meera"
    male: "arvind"
  pitch: 0
  pace: 1.0
  loudness: 1.5
  speech_sample_rate: 22050
  enable_preprocessing: true
  # Bulbul supports fewer languages than Mayura
  supported_languages:
    - "hi-IN"
    - "ta-IN"
    - "te-IN"
    - "kn-IN"
    - "bn-IN"
    - "ml-IN"
  # Marathi TTS: Not natively supported — fallback to Hindi voice with Marathi text
  # or skip TTS for unsupported languages
  fallback_for_unsupported: "hi-IN"
