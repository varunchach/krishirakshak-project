# Florence-2 Fine-tuning Configuration

model:
  name: "microsoft/Florence-2-base-ft"
  revision: "refs/pr/6"
  trust_remote_code: true
  task_prompt: "<CROP_DISEASE>"

lora:
  r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

training:
  epochs: 10
  batch_size: 8
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_length: 512
  fp16: true
  gradient_accumulation_steps: 4
  freeze_vision_encoder: true
  logging_steps: 50
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
  dataloader_num_workers: 4

dataset:
  name: "PlantVillage"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  image_size: 224
  augmentations:
    - "random_horizontal_flip"
    - "random_rotation_15"
    - "color_jitter"

paths:
  raw_data: "data/raw/plantvillage/"
  processed_data: "data/processed/"
  treatment_kb: "training/treatment_kb.json"
  output_dir: "outputs/florence2_lora/"
  best_model: "outputs/florence2_lora/best/"
  sagemaker_model: "outputs/sagemaker/"

sagemaker:
  instance_type: "ml.g4dn.xlarge"
  endpoint_name: "krishirakshak-florence2"
  model_s3_path: "s3://krishirakshak-models/florence2/"
  serverless:
    memory_size_mb: 6144
    max_concurrency: 5

evaluation:
  metrics:
    - "accuracy"
    - "f1_weighted"
    - "treatment_relevance"
  min_accuracy_threshold: 0.90
  min_treatment_relevance: 0.80
