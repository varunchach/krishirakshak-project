# EfficientNet-B3 Fine-tuning Configuration — KrishiRakshak

model:
  architecture: "efficientnet_b3"
  num_classes: 5
  dropout: 0.3
  pretrained: true          # Start from ImageNet weights

classes:
  - "Tomato Early Blight"   # index 0
  - "Tomato Late Blight"    # index 1
  - "Potato Late Blight"    # index 2
  - "Tomato Leaf Mold"      # index 3
  - "Corn Common Rust"      # index 4

training:
  epochs: 20
  batch_size: 32
  learning_rate: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 2
  lr_scheduler: "cosine"
  fp16: true
  gradient_accumulation_steps: 1
  early_stopping_patience: 5
  logging_steps: 50

dataset:
  name: "PlantVillage"
  source: "kaggle"           # kaggle datasets download -d abdallahalidev/plantvillage-dataset
  image_size: 300            # EfficientNet-B3 native input size
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  augmentations:
    - random_horizontal_flip
    - random_vertical_flip
    - random_rotation_30
    - color_jitter
    - random_erasing

paths:
  raw_data:   "data/raw/plantvillage/"
  output_dir: "outputs/efficientnet_b3/"
  best_model: "models_pkl/best_model.pth"

sagemaker:
  instance_type: "ml.g4dn.xlarge"
  s3_model_path: "s3://krishirakshak-models/efficientnet_b3/"

evaluation:
  low_confidence_threshold: 40    # % — below this → ask for clearer image
  min_accuracy_threshold: 0.92
