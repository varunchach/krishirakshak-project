name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "What to deploy"
        required: true
        default: "both"
        type: choice
        options: [api, ui, both]

env:
  AWS_REGION:      us-east-1
  ECR_REGISTRY:    593755927741.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO_API:    krishirakshak-api
  ECR_REPO_UI:     krishirakshak-ui
  ECS_CLUSTER:     krishirakshak-cluster
  ECS_SERVICE_API: krishirakshak-api
  ECS_SERVICE_UI:  krishirakshak-ui
  API_HEALTH_URL:  https://sgy86f7n6l.execute-api.us-east-1.amazonaws.com/v1/health

jobs:
  # ── Job 1: Tests — runs on every PR and every push to main ───────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      AWS_DEFAULT_REGION:            us-east-1
      AWS_ACCESS_KEY_ID:             test
      AWS_SECRET_ACCESS_KEY:         test
      SAGEMAKER_REGION:              ap-south-1
      CLASSIFIER_BACKEND:            local
      DYNAMODB_TABLE:                krishirakshak-predictions-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest src/tests/ -v --tb=short --ignore=src/tests/test_api.py

  # ── Job 2: Deploy API — skip if only frontend/ changed ───────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs: test
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'api' || github.event.inputs.deploy_target == 'both'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if API files changed
        id: api-changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git fetch origin ${{ github.event.before }} --depth=1 2>/dev/null || true
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null | grep -vE '^frontend/' | wc -l)
            echo "changed=$([ $CHANGED -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.api-changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.api-changes.outputs.changed == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Fetch FAISS index from S3
        if: steps.api-changes.outputs.changed == 'true'
        run: python scripts/fetch_index.py

      - name: Build and push API image
        if: steps.api-changes.outputs.changed == 'true'
        id: build-api
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_API }}:${{ github.sha }}"
          docker build -f Dockerfile -t "$IMAGE" -t "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_API }}:latest" .
          docker push "$IMAGE"
          docker push "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_API }}:latest"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Update task definition with new image
        if: steps.api-changes.outputs.changed == 'true'
        id: render-api-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/taskdef-api.json
          container-name:  api
          image:           ${{ steps.build-api.outputs.image }}

      - name: Deploy API to ECS
        if: steps.api-changes.outputs.changed == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:        ${{ steps.render-api-taskdef.outputs.task-definition }}
          service:                ${{ env.ECS_SERVICE_API }}
          cluster:                ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:       10

      - name: Health check
        if: steps.api-changes.outputs.changed == 'true'
        run: |
          echo "Waiting 30s for container to warm up..."
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ env.API_HEALTH_URL }})
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — status $STATUS"
            exit 1
          fi
          echo "Health check passed (HTTP $STATUS)"

      - name: Skip notice
        if: steps.api-changes.outputs.changed == 'false'
        run: echo "No API files changed — skipping API deploy"

  # ── Job 3: Deploy UI — skip if only src/ changed ─────────────────────────────
  deploy-ui:
    name: Deploy UI
    runs-on: ubuntu-latest
    needs: test
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.deploy_target == 'ui' || github.event.inputs.deploy_target == 'both'))

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check if UI files changed
        id: ui-changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            git fetch origin ${{ github.event.before }} --depth=1 2>/dev/null || true
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null | grep -E '^frontend/|^Dockerfile\.streamlit' | wc -l)
            echo "changed=$([ $CHANGED -gt 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        if: steps.ui-changes.outputs.changed == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: steps.ui-changes.outputs.changed == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push UI image
        if: steps.ui-changes.outputs.changed == 'true'
        id: build-ui
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_UI }}:${{ github.sha }}"
          docker build -f Dockerfile.streamlit -t "$IMAGE" -t "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_UI }}:latest" .
          docker push "$IMAGE"
          docker push "${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO_UI }}:latest"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Update task definition with new image
        if: steps.ui-changes.outputs.changed == 'true'
        id: render-ui-taskdef
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: infra/taskdef-ui.json
          container-name:  ui
          image:           ${{ steps.build-ui.outputs.image }}

      - name: Deploy UI to ECS
        if: steps.ui-changes.outputs.changed == 'true'
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:        ${{ steps.render-ui-taskdef.outputs.task-definition }}
          service:                ${{ env.ECS_SERVICE_UI }}
          cluster:                ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes:       15

      - name: Skip notice
        if: steps.ui-changes.outputs.changed == 'false'
        run: echo "No UI files changed — skipping UI deploy"
