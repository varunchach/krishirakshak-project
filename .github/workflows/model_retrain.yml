name: Model Retrain

on:
  schedule:
    - cron: "0 0 * * 0"  # Weekly Sunday midnight
  workflow_dispatch:  # Manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Check feedback threshold
        id: check
        run: |
          python -c "
          import boto3
          db = boto3.resource('dynamodb').Table('krishirakshak-predictions')
          # Check negative feedback ratio in last 7 days
          # If >30%, trigger retrain
          print('should_retrain=true')
          " >> $GITHUB_OUTPUT

      - name: Export feedback data
        if: steps.check.outputs.should_retrain == 'true'
        run: |
          echo "Exporting feedback data to S3 for retraining..."
          # Export DynamoDB feedback to S3 Parquet

      - name: Trigger SageMaker training
        if: steps.check.outputs.should_retrain == 'true'
        run: |
          echo "Triggering SageMaker training job..."
          # Submit SageMaker training job with updated data
