name: Scheduled Ingestion Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours — adjust as needed
  workflow_dispatch:
    inputs:
      force_reingest:
        description: "Force re-ingest all docs (ignores ETag manifest)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

env:
  AWS_REGION:        us-east-1
  SAGEMAKER_REGION:  ap-south-1
  DOCS_S3_BUCKET:    krishirakshak-assets-dev
  FAISS_S3_BUCKET:   krishirakshak-assets-dev
  FAISS_S3_KEY:      faiss_index/store.pkl
  DOCS_S3_PREFIX:    pipeline-docs/

jobs:
  ingest:
    name: Ingest Documents from S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.prod.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Run ingestion pipeline
        env:
          DOCS_S3_BUCKET:     ${{ env.DOCS_S3_BUCKET }}
          DOCS_S3_PREFIX:     ${{ env.DOCS_S3_PREFIX }}
          FAISS_S3_BUCKET:    ${{ env.FAISS_S3_BUCKET }}
          FAISS_S3_KEY:       ${{ env.FAISS_S3_KEY }}
          SAGEMAKER_REGION:   ${{ env.SAGEMAKER_REGION }}
          SAGEMAKER_ENDPOINT: bge-m3-krishirakshak
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force_reingest }}" = "true" ]; then
            FORCE_FLAG="--force-reingest"
            echo "Force re-ingest enabled — all docs will be re-processed"
          fi
          python scripts/ingest_pipeline.py $FORCE_FLAG
